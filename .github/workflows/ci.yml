name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: |
          node --check src/patcher.js
          node --check src/enhance.js
      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('src/manifest.json','utf8'))"
