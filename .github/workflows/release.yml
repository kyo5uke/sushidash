name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package extension
        run: |
          cp -r src sushidash
          zip -r "sushidash-${{ github.ref_name }}.zip" sushidash
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: sushidash-*.zip
