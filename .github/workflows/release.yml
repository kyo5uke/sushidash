name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package extension
        run: cd src && zip -r "../sushida-cache-${{ github.ref_name }}.zip" .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: sushida-cache-*.zip
